name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19.5"

      - name: Package
        shell: pwsh
        run: ./scripts/package_release.ps1

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/elv-*.escript \
            dist/elixir-luv-v-*-universal.zip \
            dist/elixir-luv-v-*-universal.tar.gz \
            --title "Elixir Luv V ${GITHUB_REF_NAME#v}" \
            --notes-file CHANGELOG.md
